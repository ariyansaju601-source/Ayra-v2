name: AYRA Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Build APK
        run: gradle assembleDebug --no-daemon --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Xmx2g"

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: AYRA-v2-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Show Error
        if: failure()
        run: |
          find . -name "*.log" -path "*/build/*" 2>/dev/null | xargs grep -l "error:" 2>/dev/null | xargs cat 2>/dev/null | grep -A3 "error:" | head -80 || true
          echo "=== app/build.gradle ==="
          cat app/build.gradle
